<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery - Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-container">
            <!-- Logo Section -->
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-utensils"></i>
                </div>
                <h1>FoodieExpress</h1>
                <p>Delicious food delivered to your door</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <span class="input-highlight"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <span class="input-highlight"></span>
                </div>

                <button type="submit" class="login-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <h3><i class="fas fa-info-circle"></i> Demo Credentials</h3>
                <div class="credentials-grid">
                    <div class="credential-card" onclick="fillCredentials('admin@foodie.com', '1234', 'admin')">
                        <i class="fas fa-user-shield"></i>
                        <span>Admin</span>
                        <small>admin@foodie.com / 1234</small>
                    </div>
                    <div class="credential-card" onclick="fillCredentials('user@foodie.com', '1234', 'user')">
                        <i class="fas fa-user"></i>
                        <span>User</span>
                        <small>user@foodie.com / 1234</small>
                    </div>
                </div>
            </div>

            <!-- Signup Link -->
            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>

            <!-- Back to Home Link -->
            <a href="index.html" class="back-home">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="script.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('currentUser')) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        // Login Form Submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validate credentials
            if (validateLogin(email, password)) {
                showToast('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    const user = JSON.parse(localStorage.getItem('currentUser'));
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } else {
                showToast('Invalid email or password!', 'error');
            }
        });

        // Fill credentials function
        function fillCredentials(email, password, role) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }
    </script>
</body>
</html>

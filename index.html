<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress - Home</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <i class="fas fa-utensils"></i>
            </div>
            <span>FoodieExpress</span>
        </div>
        
        <div class="nav-menu">
            <a href="index.html" class="nav-link active">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="cart.html" class="nav-link">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <div class="user-dropdown">
                <button class="user-btn">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1>Welcome to <span>FoodieExpress</span></h1>
                <p>Order your favorite food from the best restaurants in town</p>
            </div>
        </section>

        <!-- Search Bar Section -->
        <section class="search-section">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search for dishes, restaurants, or cuisines...">
                <button id="searchBtn">Search</button>
            </div>
        </section>

        <!-- Food Categories -->
        <section class="categories-section">
            <div class="category-filters">
                <button class="category-btn active" data-category="all">
                    <i class="fas fa-th"></i> All
                </button>
                <button class="category-btn" data-category="pizza">
                    <i class="fas fa-pizza-slice"></i> Pizza
                </button>
                <button class="category-btn" data-category="burger">
                    <i class="fas fa-hamburger"></i> Burger
                </button>
                <button class="category-btn" data-category="indian">
                    <i class="fas fa-curry"></i> Indian
                </button>
                <button class="category-btn" data-category="chinese">
                    <i class="fas fa-noodles"></i> Chinese
                </button>
                <button class="category-btn" data-category="dessert">
                    <i class="fas fa-ice-cream"></i> Desserts
                </button>
                <button class="category-btn" data-category="beverage">
                    <i class="fas fa-coffee"></i> Beverages
                </button>
            </div>
        </section>

        <!-- Food Menu Grid -->
        <section class="menu-section">
            <h2 class="section-title">
                <i class="fas fa-utensils"></i> Popular Dishes
            </h2>
            
            <div class="food-grid" id="foodGrid">
                <!-- Food cards will be generated by JavaScript -->
            </div>
            
            <!-- No Results Message -->
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>No food items found</h3>
                <p>Try searching with different keywords</p>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="script.js"></script>
    <script>
        // Check if user is logged in
        checkAuth();

        // Initialize page
        initializeHomePage();

        // Display user name
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (user.name) {
            document.getElementById('userName').textContent = user.name;
        }

        // Update cart count
        updateCartCount();

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchFood(e.target.value);
        });

        document.getElementById('searchBtn').addEventListener('click', function() {
            searchFood(document.getElementById('searchInput').value);
        });

        // Category filter buttons
        const categoryBtns = document.querySelectorAll('.category-btn');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Remove active class from all buttons
                categoryBtns.forEach(b => b.classList.remove('active'));
                // Add active class to clicked button
                this.classList.add('active');
                // Filter by category
                filterByCategory(this.dataset.category);
            });
        });

        // Logout function
        function logout() {
            localStorage.removeItem('currentUser');
            showToast('Logged out successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
    </script>
</body>
</html>

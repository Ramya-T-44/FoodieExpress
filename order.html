<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodieExpress - Order Confirmation</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo">
                <i class="fas fa-utensils"></i>
            </div>
            <span>FoodieExpress</span>
        </div>
        
        <div class="nav-menu">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i> Home
            </a>
            <a href="cart.html" class="nav-link">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <div class="user-dropdown">
                <button class="user-btn">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown-content">
                    <a href="#" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content order-page">
        <div class="order-container">
            <!-- Success Message -->
            <div class="order-success">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Order Placed Successfully!</h1>
                <p>Thank you for your order. We're preparing your food now.</p>
            </div>

            <!-- Order Details Card -->
            <div class="order-details-card">
                <div class="order-info">
                    <div class="order-id-display">
                        <span class="label">Order ID</span>
                        <span class="value" id="orderId">---</span>
                    </div>
                    <div class="order-status">
                        <span class="label">Status</span>
                        <span class="status-badge" id="orderStatus">Pending</span>
                    </div>
                </div>

                <!-- Order Items -->
                <div class="order-items-section">
                    <h3><i class="fas fa-utensils"></i> Order Items</h3>
                    <div id="orderItemsList">
                        <!-- Order items will be rendered here -->
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="order-summary-section">
                    <h3><i class="fas fa-receipt"></i> Payment Details</h3>
                    <div class="summary-details">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotalPrice">₹0</span>
                        </div>
                        <div class="summary-row">
                            <span>Delivery Fee</span>
                            <span id="deliveryFee">₹40</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (5%)</span>
                            <span id="taxAmount">₹0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total Paid</span>
                            <span id="totalPrice">₹0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="order-actions">
                <a href="index.html" class="action-btn continue-btn">
                    <i class="fas fa-utensils"></i> Order More
                </a>
                <button class="action-btn track-btn" onclick="trackOrder()">
                    <i class="fas fa-map-marker-alt"></i> Track Order
                </button>
            </div>

            <!-- Estimated Delivery Time -->
            <div class="delivery-estimate">
                <i class="fas fa-clock"></i>
                <span>Estimated delivery time: <strong>35-45 minutes</strong></span>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="script.js"></script>
    <script>
        // Check if user is logged in
        checkAuth();

        // Display user name
        const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (user.name) {
            document.getElementById('userName').textContent = user.name;
        }

        // Update cart count
        updateCartCount();

        // Display order details
        displayOrderDetails();

        // Logout function
        function logout() {
            localStorage.removeItem('currentUser');
            showToast('Logged out successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }

        // Display order details
        function displayOrderDetails() {
            // Get the latest order
            const orders = JSON.parse(localStorage.getItem('foodieOrders') || '[]');
            
            if (orders.length === 0) {
                // No orders, redirect to home
                window.location.href = 'index.html';
                return;
            }

            // Get the last order
            const order = orders[orders.length - 1];

            // Display order ID
            document.getElementById('orderId').textContent = order.orderId;
            
            // Display status
            document.getElementById('orderStatus').textContent = order.status;

            // Display items
            const itemsList = document.getElementById('orderItemsList');
            let itemsHtml = '';
            
            order.items.forEach(item => {
                const itemTotal = item.price * item.quantity;
                itemsHtml += `
                    <div class="order-item">
                        <div class="item-info">
                            <span class="item-name">${item.name}</span>
                            <span class="item-quantity">x${item.quantity}</span>
                        </div>
                        <span class="item-price">₹${itemTotal}</span>
                    </div>
                `;
            });
            
            itemsList.innerHTML = itemsHtml;

            // Display summary
            document.getElementById('subtotalPrice').textContent = '₹' + order.subtotal;
            document.getElementById('deliveryFee').textContent = '₹' + order.deliveryFee;
            document.getElementById('taxAmount').textContent = '₹' + order.tax;
            document.getElementById('totalPrice').textContent = '₹' + order.total;
        }

        // Track order function
        function trackOrder() {
            showToast('Order tracking: Your order is being prepared!', 'info');
        }
    </script>
</body>
</html>
